<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline';" />
    <style>
      /* ───────────────────────────────────────────────────────────────
         PoE2 item scorer — "arcane tooltip" HUD.
         Grounded in the game's own item tooltip: warm brown-black ground,
         an antique-gold engraved hairline (echoing the --------  rules in
         copied item text), rarity-colored item names, a humanist serif.
         Gold is reserved exclusively for the keeper (wishlist) signal.
         Fonts are Windows-native (Constantia) so nothing has to load over
         the network under the locked-down CSP.
         ─────────────────────────────────────────────────────────────── */
      :root {
        color-scheme: dark;
        --bg: #14110d;
        --bg2: #1c1813;
        --frame: rgba(200, 160, 79, 0.22);
        --frame-strong: rgba(200, 160, 79, 0.4);
        --ink: #e8e0d0;
        --ink-dim: #9a8f7a;
        --ink-faint: #6f6757;
        --gold: #c8a04f;
        --gold-bright: #e4c071;
        --serif: Constantia, "Iowan Old Style", Georgia, "Times New Roman", serif;
        --sans: "Segoe UI", system-ui, sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: transparent; overflow: hidden; font-family: var(--sans); }
      #app { padding: 0; }

      /* labels: engraved small-caps, the utility voice of the panel */
      .label {
        font-size: 9px; font-weight: 600; letter-spacing: 0.14em;
        text-transform: uppercase; color: var(--ink-dim);
      }

      /* ── collapsed: the glance state, shown on every Ctrl+C ─────────── */
      .collapsed {
        background: linear-gradient(180deg, var(--bg2), var(--bg));
        border: 1px solid var(--frame);
        border-left-width: 3px;
        border-radius: 3px;
        padding: 8px 11px;
        color: var(--ink);
        cursor: pointer; user-select: none;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.55);
      }
      .collapsed.keeper {
        border-color: var(--frame-strong);
        box-shadow: 0 6px 22px rgba(200, 160, 79, 0.2);
      }
      .collapsed .cmain { display: flex; align-items: baseline; gap: 9px; white-space: nowrap; }
      .collapsed .cpct { font-family: var(--serif); font-weight: 700; font-size: 19px; line-height: 1; }
      .collapsed .cx { font-family: var(--serif); font-size: 12px; color: var(--ink-dim); }
      .collapsed .ctitle {
        flex: 1; min-width: 0; font-family: var(--serif); font-size: 14px;
        overflow: hidden; text-overflow: ellipsis;
      }
      .collapsed .chint { color: var(--ink-faint); font-size: 10px; }
      .collapsed .ckeeper {
        display: flex; align-items: center; gap: 5px;
        margin-top: 5px; padding-top: 5px;
        border-top: 1px solid var(--frame);
        font-size: 11px; font-weight: 600; color: var(--gold);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }

      /* ── expanded: the full tooltip-style card ─────────────────────── */
      .card {
        position: relative;
        background: linear-gradient(180deg, var(--bg2), var(--bg) 60%);
        border: 1px solid var(--frame);
        border-radius: 4px;
        padding: 13px 15px 11px;
        color: var(--ink);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
      }
      /* engraved gold hairline along the top — the tooltip's signature edge */
      .card::before {
        content: ""; position: absolute; inset: 0 0 auto 0; height: 2px;
        border-radius: 4px 4px 0 0;
        background: linear-gradient(90deg, transparent, var(--frame-strong) 25%, var(--frame-strong) 75%, transparent);
      }
      .card.keeper { border-color: var(--frame-strong); box-shadow: 0 8px 32px rgba(200, 160, 79, 0.18); }
      .card.keeper::before {
        background: linear-gradient(90deg, transparent, var(--gold) 25%, var(--gold-bright) 50%, var(--gold) 75%, transparent);
      }

      .x {
        position: absolute; top: 9px; right: 10px;
        width: 18px; height: 18px; line-height: 17px; text-align: center;
        font-size: 12px; color: var(--ink-faint); cursor: pointer; border-radius: 3px;
      }
      .x:hover { background: rgba(255, 255, 255, 0.08); color: var(--ink); }

      .hdr .name {
        font-family: var(--serif); font-size: 17px; font-weight: 600; line-height: 1.15;
        color: var(--ink); padding-right: 22px;
      }
      .hdr .sub { font-size: 10px; color: var(--ink-dim); margin-top: 2px; letter-spacing: 0.02em; }

      /* hero: the % reads first, the raw fraction is the supporting detail */
      .hero { display: flex; align-items: baseline; gap: 10px; margin: 11px 0 7px; }
      .hero .pctbig { font-family: var(--serif); font-size: 38px; font-weight: 700; line-height: 0.85; }
      .hero .frac { font-family: var(--serif); margin-left: auto; }
      .hero .frac .sx { font-size: 22px; font-weight: 600; }
      .hero .frac .slash { font-size: 15px; color: var(--ink-faint); margin: 0 1px; }
      .hero .frac .sy { font-size: 15px; color: var(--ink-dim); }

      /* signature: the ceiling gauge — fill toward the best possible roll */
      .gauge {
        position: relative; height: 7px; border-radius: 4px;
        background: rgba(0, 0, 0, 0.45); border: 1px solid var(--frame);
        overflow: hidden; margin: 0 0 3px;
      }
      .gauge .gfill { height: 100%; border-radius: 3px 0 0 3px; transition: none; }
      /* faint quarter ticks, so a roll reads against 25 / 50 / 75 / max */
      .gauge::after {
        content: ""; position: absolute; inset: 0; pointer-events: none;
        background: repeating-linear-gradient(90deg,
          transparent, transparent calc(25% - 1px),
          rgba(0, 0, 0, 0.55) calc(25% - 1px), rgba(0, 0, 0, 0.55) 25%);
      }
      .gaugecap { display: flex; justify-content: space-between; margin-bottom: 9px; }
      .gaugecap .label.r { color: var(--ink-faint); }

      .keeperbadge {
        display: flex; align-items: center; gap: 6px;
        margin: 9px 0 4px; padding: 6px 8px;
        background: rgba(200, 160, 79, 0.08);
        border: 1px solid var(--frame); border-radius: 3px;
        font-size: 11px; font-weight: 600; color: var(--gold);
      }
      .keeperbadge .kw { font-weight: 700; letter-spacing: 0.1em; }
      .keeperbadge .kd { color: var(--gold-bright); font-weight: 600; }

      .warn { font-size: 10px; color: #d8a23e; margin: 6px 0; }

      .sep { height: 1px; background: var(--frame); margin: 9px 0; }

      .affixes { display: flex; flex-direction: column; gap: 8px; }
      .affix { font-size: 11px; }
      .arow { display: flex; gap: 7px; align-items: baseline; }
      .apts { font-family: var(--serif); font-weight: 700; font-size: 13px; min-width: 24px; }
      .atext { color: var(--ink); line-height: 1.25; flex: 1; }
      .star {
        cursor: pointer; color: var(--ink-faint); font-size: 13px; line-height: 1;
        user-select: none; padding: 0 1px;
      }
      .star:hover { color: var(--gold-bright); }
      .star.on { color: var(--gold); }
      .affix.fav .atext { color: var(--gold-bright); }
      .ameta { font-size: 9px; color: var(--ink-faint); }
      .affix.unmatched { opacity: 0.45; }

      .foot {
        margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--frame);
        font-size: 9px; color: var(--ink-faint); display: flex; justify-content: space-between;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="collapsed">
        <div class="cmain">
          <span class="cpct">—</span><span class="ctitle">Ctrl+C an item to score it</span>
        </div>
      </div>
    </div>
    <script src="./dist/overlay-renderer.js"></script>
  </body>
</html>
